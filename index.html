  <body>
    <div class="stage">
      <header class="masthead">
        <span class="masthead-kicker">sala de prova</span>
        <h1 class="masthead-title">Quiz</h1>
      </header>

      <div class="scoreboard" id="scoreboard" aria-hidden="true"></div>

      <main class="card" id="card">
        <!-- conteúdo injetado via JS -->
      </main>

      <footer class="hint" id="hint">
        use as teclas <kbd>A</kbd>–<kbd>E</kbd> para responder
      </footer>
    </div>

    <script>
      (function () {
        const raw = document.getElementById("quiz-data").textContent;
        const QUESTIONS = JSON.parse(raw);

        /* Nota: se preferir carregar de um arquivo externo (perguntas.json)
     servido por um servidor local, troque as duas linhas acima por:

     let QUESTIONS = [];
     fetch('perguntas.json').then(r => r.json()).then(data => {
       QUESTIONS = data;
       start();
     });

     Isso não funciona abrindo o HTML direto (file://) por causa do CORS —
     por isso este arquivo já vem com as perguntas embutidas no bloco JSON acima. */

        const LETTERS = ["a", "b", "c", "d", "e"];
        const card = document.getElementById("card");
        const scoreboard = document.getElementById("scoreboard");

        let current = 0;
        let score = 0;
        let answered = false;

        function buildScoreboard() {
          scoreboard.innerHTML = "";
          scoreboard.setAttribute("aria-hidden", "false");
          QUESTIONS.forEach((_, i) => {
            const seg = document.createElement("span");
            seg.className = "seg";
            seg.dataset.index = i;
            scoreboard.appendChild(seg);
          });
          updateScoreboard();
        }

        function updateScoreboard() {
          const segs = scoreboard.querySelectorAll(".seg");
          segs.forEach((seg, i) => {
            seg.classList.remove(
              "seg-current",
              "seg-done",
              "seg-correct",
              "seg-wrong",
            );
            if (i < current) {
              seg.classList.add("seg-done");
            } else if (i === current) {
              seg.classList.add("seg-current");
            }
          });
        }

        function markScoreboard(idx, correct) {
          const segs = scoreboard.querySelectorAll(".seg");
          segs[idx].classList.add(correct ? "seg-correct" : "seg-wrong");
        }

        function renderQuestion() {
          answered = false;
          const q = QUESTIONS[current];
          updateScoreboard();

          const optionsHtml = LETTERS.filter((l) => q.opcoes[l] !== undefined)
            .map(
              (l) => `
        <button class="option" data-letter="${l}" role="listitem">
          <span class="badge">${l}</span>
          <span class="option-text">${q.opcoes[l]}</span>
        </button>
      `,
            )
            .join("");

          const categoriaHtml = q.categoria
            ? `<span class="q-tag">${q.categoria}</span>`
            : "";

          const numeroHtml = q.numeroOriginal
            ? `<span class="q-original">questão original nº <span class="mono">${q.numeroOriginal}</span></span>`
            : "";

          card.innerHTML = `
      <div class="q-meta">
        <span class="q-count">pergunta <span class="mono">${current + 1}</span> / <span class="mono">${QUESTIONS.length}</span></span>
        <span class="q-score">acertos <span class="mono">${score}</span></span>
      </div>
      <div class="q-tags">${categoriaHtml}${numeroHtml}</div>
      <h2 class="q-text">${q.pergunta}</h2>
      <div class="options" role="list">${optionsHtml}</div>
      <div class="feedback" id="feedback" aria-live="polite"></div>
      <div class="actions" id="actions"></div>
    `;

          card.querySelectorAll(".option").forEach((btn) => {
            btn.addEventListener("click", () =>
              selectAnswer(btn.dataset.letter),
            );
          });
        }

        function selectAnswer(letter) {
          if (answered) return;
          answered = true;

          const q = QUESTIONS[current];
          const correta = q.respostaCorreta;
          const isCorrect = letter === correta;
          if (isCorrect) score++;
          markScoreboard(current, isCorrect);

          card.querySelectorAll(".option").forEach((btn) => {
            btn.disabled = true;
            const l = btn.dataset.letter;
            if (l === correta) btn.classList.add("is-correct");
            if (l === letter && !isCorrect) btn.classList.add("is-wrong");
          });

          const feedback = document.getElementById("feedback");
          feedback.classList.add(
            "show",
            isCorrect ? "feedback-correct" : "feedback-wrong",
          );

          const fonteHtml =
            q.origem || q.gabarito
              ? `<p class="feedback-fonte">${[q.origem, q.gabarito].filter(Boolean).join(" · ")}</p>`
              : "";

          feedback.innerHTML = `
      <div class="feedback-head">
        ${
          isCorrect
            ? '<span class="feedback-tag">correto</span>'
            : `<span class="feedback-tag">incorreto</span><span class="feedback-answer">resposta certa: <strong>${correta.toUpperCase()}</strong> — ${q.opcoes[correta]}</span>`
        }
      </div>
      <p class="feedback-explain">${q.explicacao}</p>
      ${fonteHtml}
    `;

          const actions = document.getElementById("actions");
          const isLast = current === QUESTIONS.length - 1;
          actions.innerHTML = `<button class="next-btn" id="next-btn">${isLast ? "ver resultado" : "próxima pergunta →"}</button>`;
          document.getElementById("next-btn").addEventListener("click", () => {
            if (isLast) {
              renderResult();
            } else {
              current++;
              renderQuestion();
            }
          });
        }

        function renderResult() {
          updateScoreboard();
          const pct = Math.round((score / QUESTIONS.length) * 100);
          let tier = "quase lá";
          if (pct === 100) tier = "perfeito";
          else if (pct >= 80) tier = "excelente";
          else if (pct >= 50) tier = "bom trabalho";

          card.innerHTML = `
      <div class="result">
        <span class="result-kicker">resultado final</span>
        <div class="result-score">
          <span class="mono result-number">${score}</span>
          <span class="result-slash">/ ${QUESTIONS.length}</span>
        </div>
        <p class="result-tier">${tier} — ${pct}% de acertos</p>
        <button class="next-btn" id="restart-btn">refazer o quiz</button>
      </div>
    `;
          document
            .getElementById("restart-btn")
            .addEventListener("click", restart);
        }

        function restart() {
          current = 0;
          score = 0;
          buildScoreboard();
          renderQuestion();
        }

        document.addEventListener("keydown", (e) => {
          const key = e.key.toLowerCase();
          if (LETTERS.includes(key)) {
            const btn = card.querySelector(`.option[data-letter="${key}"]`);
            if (btn && !answered) btn.click();
          }
          if (key === "enter") {
            const next =
              document.getElementById("next-btn") ||
              document.getElementById("restart-btn");
            if (next) next.click();
          }
        });

        buildScoreboard();
        renderQuestion();
      })();
    </script>

    <style>
      :root {
        --bg: #14172b;
        --bg-alt: #1e2242;
        --card: #f7f2e7;
        --ink: #1e2242;
        --ink-soft: #5b5f82;
        --gold: #e7b23d;
        --correct: #3f9b6e;
        --correct-bg: #e4f1e9;
        --wrong: #d8492f;
        --wrong-bg: #fbe6e0;
        --line: #e2dac8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(
            circle at 15% 10%,
            rgba(231, 178, 61, 0.09),
            transparent 45%
          ),
          radial-gradient(
            circle at 85% 90%,
            rgba(231, 178, 61, 0.06),
            transparent 40%
          ),
          var(--bg);
        font-family: "Sora", sans-serif;
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .stage {
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .masthead {
        text-align: center;
        color: var(--card);
      }

      .masthead-kicker {
        display: block;
        font-family: "Sora", sans-serif;
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 6px;
      }

      .masthead-title {
        font-family: "Fraunces", serif;
        font-weight: 700;
        font-size: 44px;
        margin: 0;
        letter-spacing: -0.01em;
      }

      .scoreboard {
        display: flex;
        gap: 5px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .seg {
        width: 14px;
        height: 6px;
        border-radius: 3px;
        background: rgba(247, 242, 231, 0.16);
        transition:
          background 0.25s ease,
          transform 0.2s ease;
      }

      .seg-current {
        background: var(--gold);
        box-shadow: 0 0 0 3px rgba(231, 178, 61, 0.2);
      }

      .seg-done {
        background: rgba(247, 242, 231, 0.4);
      }

      .seg-correct {
        background: var(--correct);
      }

      .seg-wrong {
        background: var(--wrong);
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        padding: 36px 32px;
        box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(20, 23, 43, 0.06);
      }

      .q-meta {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--ink-soft);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 14px;
      }

      .mono {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        color: var(--ink);
      }

      .q-tags {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .q-tag {
        display: inline-block;
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--bg);
        background: var(--gold);
        padding: 4px 10px;
        border-radius: 999px;
      }

      .q-original {
        display: inline-flex;
        align-items: center;
        font-size: 11.5px;
        color: var(--ink-soft);
        padding: 4px 2px;
      }

      .q-text {
        font-family: "Fraunces", serif;
        font-weight: 600;
        font-size: 25px;
        line-height: 1.32;
        margin: 0 0 26px;
      }

      .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .option {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        text-align: left;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1.5px solid var(--line);
        background: #fffdf8;
        cursor: pointer;
        font-family: "Sora", sans-serif;
        font-size: 15.5px;
        color: var(--ink);
        transition:
          border-color 0.15s ease,
          transform 0.1s ease,
          background 0.15s ease;
      }

      .option:hover:not(:disabled) {
        border-color: var(--gold);
        transform: translateY(-1px);
      }

      .option:disabled {
        cursor: default;
      }

      .badge {
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
        border-radius: 8px;
        background: var(--bg-alt);
        color: var(--card);
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 14px;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .option-text {
        flex: 1;
      }

      .option.is-correct {
        background: var(--correct-bg);
        border-color: var(--correct);
      }
      .option.is-correct .badge {
        background: var(--correct);
      }

      .option.is-wrong {
        background: var(--wrong-bg);
        border-color: var(--wrong);
      }
      .option.is-wrong .badge {
        background: var(--wrong);
      }

      .feedback {
        margin-top: 20px;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition:
          max-height 0.35s ease,
          opacity 0.25s ease;
        border-radius: 12px;
      }

      .feedback.show {
        max-height: 420px;
        opacity: 1;
        padding: 16px 18px;
        border: 1.5px solid var(--line);
      }

      .feedback-correct {
        background: var(--correct-bg);
        border-color: var(--correct);
      }

      .feedback-wrong {
        background: var(--wrong-bg);
        border-color: var(--wrong);
      }

      .feedback-head {
        display: flex;
        align-items: baseline;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 6px;
      }

      .feedback-tag {
        font-family: "JetBrains Mono", monospace;
        font-weight: 700;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .feedback-correct .feedback-tag {
        color: var(--correct);
      }
      .feedback-wrong .feedback-tag {
        color: var(--wrong);
      }

      .feedback-answer {
        font-size: 14px;
        color: var(--ink-soft);
      }

      .feedback-explain {
        margin: 0;
        font-size: 14.5px;
        line-height: 1.55;
        color: var(--ink);
      }

      .feedback-fonte {
        margin: 10px 0 0;
        padding-top: 10px;
        border-top: 1px dashed var(--line);
        font-family: "JetBrains Mono", monospace;
        font-size: 11.5px;
        color: var(--ink-soft);
        line-height: 1.5;
      }

      .actions {
        margin-top: 22px;
        display: flex;
        justify-content: flex-end;
      }

      .next-btn {
        font-family: "Sora", sans-serif;
        font-weight: 600;
        font-size: 14.5px;
        color: var(--bg);
        background: var(--gold);
        border: none;
        border-radius: 10px;
        padding: 12px 22px;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          filter 0.12s ease;
      }

      .next-btn:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }

      .result {
        text-align: center;
        padding: 20px 0 8px;
      }

      .result-kicker {
        display: block;
        font-size: 12px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--ink-soft);
        margin-bottom: 14px;
      }

      .result-score {
        display: flex;
        align-items: baseline;
        justify-content: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .result-number {
        font-size: 64px;
        color: var(--bg-alt);
      }

      .result-slash {
        font-family: "JetBrains Mono", monospace;
        font-size: 22px;
        color: var(--ink-soft);
      }

      .result-tier {
        font-family: "Fraunces", serif;
        font-size: 19px;
        font-weight: 600;
        margin: 0 0 26px;
      }

      .hint {
        text-align: center;
        font-size: 12.5px;
        color: rgba(247, 242, 231, 0.55);
      }

      .hint kbd {
        font-family: "JetBrains Mono", monospace;
        background: rgba(247, 242, 231, 0.12);
        padding: 1px 6px;
        border-radius: 4px;
        color: var(--card);
      }

      @media (max-width: 480px) {
        .masthead-title {
          font-size: 34px;
        }
        .card {
          padding: 26px 20px;
        }
        .q-text {
          font-size: 21px;
        }
        .result-number {
          font-size: 48px;
        }
        .seg {
          width: 9px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          transition: none !important;
        }
      }
    </style>
  </body>
</html>
